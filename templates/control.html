<!DOCTYPE html>
<html>
<head>
    <title>Kho Kho Control Panel</title>

    <!-- ✅ IMPORTANT for mobile layout -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ✅ CSS -->
    <link rel="stylesheet" href="/static/control.css">
</head>

<body>

<div class="wrapper">

    <!-- ⏱ TIMER -->
    <div class="section center">
        <p class="label">TURN TIMER</p>
        <h1 id="timer">07:00</h1>

        <div class="progress-bar">
            <div id="progress"></div>
        </div>

        <!-- ✅ CONTROLS -->
        <div class="row">
            <button onclick="resetGame()">⟳ RESET</button>
            <button onclick="toggleGame()">⏸ PLAY / PAUSE</button>
        </div>
    </div>

    <!-- 🔄 CURRENT TURN -->
    <div class="section">
        <p class="label">CURRENT TURN</p>

        <div class="grid">
            <div class="card">
                <p>CHASING</p>
                <h3 id="chasing_team">Red Kites</h3>
            </div>

            <div class="card">
                <p>DEFENDING</p>
                <h3 id="defending_team">Blue Hawks</h3>
            </div>

            <div class="card">
                <p>INNING</p>
                <h3 id="inning">1/2</h3>
            </div>

            <div class="card">
                <p>TURN</p>
                <h3 id="turn">1/2</h3>
            </div>
        </div>
    </div>

    <!-- 🔁 END TURN -->
    <div class="section center">
        <button class="big" onclick="endTurn()">END TURN</button>
    </div>

    <!-- 📊 SCORES -->
    <div class="section">
        <div class="score-card">
            <p id="team1_name">Red Kites</p>
            <h2 id="team1_score">0</h2>
        </div>

        <div class="score-card">
            <p id="team2_name">Blue Hawks</p>
            <h2 id="team2_score">0</h2>
        </div>
    </div>

</div>

<!-- ✅ JS -->
<script src="/static/control.js"></script>

</body>
</html>
